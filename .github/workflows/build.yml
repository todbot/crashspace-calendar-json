name: Build and deploy calendar

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours, UTC
  push:
    branches: [main]          # rebuild when you change the page/script
  workflow_dispatch: {}        # adds a manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node generate-events.js   # writes events.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .                       # repo root, now including events.json

      - id: deploy
        uses: actions/deploy-pages@v4

